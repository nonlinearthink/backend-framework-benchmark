<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Benchmark Compare</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0e12;
      --surface: #161a22;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --border: #2a3140;
      --warn-bg: #2a2410;
      --warn-border: #5c4a14;
      --warn-text: #f0d78c;
    }
    body {
      font-family: system-ui, sans-serif;
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: var(--bg);
      color: var(--text);
    }
    h1 { font-weight: 600; letter-spacing: -0.02em; }
    h2 { font-size: 1rem; font-weight: 500; color: var(--muted); margin-top: -0.5rem; }
    code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.35em;
      font-size: 0.9em;
    }
    #file-hint {
      padding: 1rem;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 8px;
      color: var(--warn-text);
    }
    canvas { margin-bottom: 2rem; }
  </style>
</head>
<body>
  <h1>Plaintext benchmark</h1>
  <h2 id="subtitle"></h2>
  <p id="file-hint" hidden>
    无法通过 <code>file://</code> 加载 JSON（浏览器 CORS 限制）。请在仓库根目录运行
    <code>bun run compare</code>，然后在打开的 <code>http://127.0.0.1:3456/compare.html</code> 中查看。
  </p>
  <canvas id="rps-vs-c"></canvas>
  <canvas id="p99-vs-c"></canvas>
  <canvas id="rps-at-c"></canvas>
  <canvas id="percentiles-at-c"></canvas>
  <script>
    const FRAMEWORK_LABELS = {
      elysia: "Elysia (Bun)",
      hono: "Hono (Bun)",
      nestjs: "NestJS (Bun)",
      "nestjs-node": "NestJS (Node)",
      fiber: "Fiber (Go)",
      gin: "Gin (Go)",
    };

    const COLORS = [
      "rgba(192, 132, 252, 0.85)",
      "rgba(255, 87, 51, 0.85)",
      "rgba(244, 114, 182, 0.85)",
      "rgba(251, 191, 36, 0.85)",
      "rgba(34, 211, 238, 0.85)",
      "rgba(163, 230, 53, 0.85)",
    ];

    const BORDER_COLORS = [
      "rgb(192, 132, 252)",
      "rgb(255, 87, 51)",
      "rgb(244, 114, 182)",
      "rgb(251, 191, 36)",
      "rgb(34, 211, 238)",
      "rgb(163, 230, 53)",
    ];

    const chartText = "#e8eaed";
    const chartMuted = "#9aa0a6";
    const chartGrid = "rgba(255, 255, 255, 0.08)";

    function frameworkLabel(id) {
      return FRAMEWORK_LABELS[id] ?? id;
    }

    function chartOptions(title, yLabel, xLabel) {
      const scale = {
        ticks: { color: chartMuted },
        grid: { color: chartGrid },
        border: { color: chartGrid },
      };
      return {
        color: chartText,
        plugins: {
          title: { display: true, text: title, color: chartText },
          legend: { labels: { color: chartText } },
        },
        scales: {
          x: {
            ...scale,
            title: xLabel
              ? { display: true, text: xLabel, color: chartMuted }
              : undefined,
          },
          y: {
            ...scale,
            title: yLabel
              ? { display: true, text: yLabel, color: chartMuted }
              : undefined,
          },
        },
      };
    }

    async function loadJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`${url}: ${r.status}`);
      return r.json();
    }

    function buildSeries(files, allData) {
      const byFramework = new Map();

      for (const entry of files) {
        const key = entry.framework;
        if (!byFramework.has(key)) {
          byFramework.set(key, {
            label: frameworkLabel(key),
            points: [],
          });
        }
        byFramework.get(key).points.push({
          connections: entry.connections,
          duration: entry.duration,
          data: allData.get(entry.file),
        });
      }

      for (const entry of byFramework.values()) {
        entry.points.sort((a, b) => a.connections - b.connections);
      }

      return [...byFramework.entries()].map(([id, { label, points }], i) => ({
        id,
        label,
        color: COLORS[i % COLORS.length],
        borderColor: BORDER_COLORS[i % BORDER_COLORS.length],
        points,
      }));
    }

    function connectionLevelsFromSeries(series) {
      const levels = new Set();
      for (const s of series) {
        for (const p of s.points) {
          levels.add(p.connections);
        }
      }
      return [...levels].sort((a, b) => a - b);
    }

    function valueAt(series, connections, pick) {
      const point = series.points.find((p) => p.connections === connections);
      return point ? pick(point.data) : null;
    }

    (async () => {
      if (location.protocol === "file:") {
        document.getElementById("file-hint").hidden = false;
        return;
      }

      const { files } = await loadJson("/api/benchmarks.json");
      if (files.length === 0) {
        throw new Error("results/ 下没有匹配的 benchmark JSON（*-plaintext-*-c*.json）");
      }

      const allData = new Map(
        await Promise.all(
          files.map(async (entry) => [entry.file, await loadJson(entry.file)]),
        ),
      );

      const series = buildSeries(files, allData);
      const connectionLevels = connectionLevelsFromSeries(series);
      const defaultC =
        connectionLevels[Math.floor(connectionLevels.length / 2)] ??
        connectionLevels.at(-1);

      const durations = [...new Set(files.map((f) => f.duration))];
      const durationText =
        durations.length === 1 ? durations[0] : durations.join(", ");

      document.getElementById("subtitle").textContent =
        `${files.length} runs · duration ${durationText} · concurrency ${connectionLevels.join(" / ")}`;

      new Chart(document.getElementById("rps-vs-c"), {
        type: "line",
        data: {
          labels: connectionLevels.map(String),
          datasets: series.map((s) => ({
            label: s.label,
            data: connectionLevels.map((c) =>
              valueAt(s, c, (d) => d.summary.requestsPerSec),
            ),
            borderColor: s.borderColor,
            backgroundColor: s.color.replace("0.85", "0.25"),
            tension: 0.15,
            spanGaps: true,
          })),
        },
        options: chartOptions("Throughput vs concurrency", "requests/sec", "connections (-c)"),
      });

      new Chart(document.getElementById("p99-vs-c"), {
        type: "line",
        data: {
          labels: connectionLevels.map(String),
          datasets: series.map((s) => ({
            label: `${s.label} p99 (ms)`,
            data: connectionLevels.map((c) =>
              valueAt(s, c, (d) => d.latencyPercentiles.p99 * 1000),
            ),
            borderColor: s.borderColor,
            backgroundColor: s.color.replace("0.85", "0.25"),
            tension: 0.15,
            spanGaps: true,
          })),
        },
        options: chartOptions("p99 latency vs concurrency", "ms", "connections (-c)"),
      });

      function renderAtC(connections) {
        const atC = series
          .map((s) => {
            const point = s.points.find((p) => p.connections === connections);
            return point ? { ...s, data: point.data } : null;
          })
          .filter(Boolean);

        const rpsChart = Chart.getChart(document.getElementById("rps-at-c"));
        const pctChart = Chart.getChart(document.getElementById("percentiles-at-c"));
        if (rpsChart) rpsChart.destroy();
        if (pctChart) pctChart.destroy();

        new Chart(document.getElementById("rps-at-c"), {
          type: "bar",
          data: {
            labels: atC.map((r) => r.label),
            datasets: [
              {
                label: "Requests/sec",
                data: atC.map((r) => r.data.summary.requestsPerSec),
                backgroundColor: atC.map((r) => r.color),
              },
            ],
          },
          options: chartOptions(`Throughput at c=${connections}`),
        });

        const keys = ["p50", "p75", "p90", "p95", "p99"];
        new Chart(document.getElementById("percentiles-at-c"), {
          type: "bar",
          data: {
            labels: keys,
            datasets: atC.map((r, i) => ({
              label: `${r.label} (ms)`,
              data: keys.map((k) => r.data.latencyPercentiles[k] * 1000),
              backgroundColor: COLORS[i % COLORS.length],
            })),
          },
          options: chartOptions(`Latency percentiles at c=${connections}`, "ms"),
        });
      }

      const slider = document.createElement("label");
      slider.style.display = "block";
      slider.style.marginBottom = "1rem";
      slider.style.color = chartMuted;
      slider.innerHTML =
        `Snapshot concurrency: <input type="range" id="c-slider" min="0" max="${connectionLevels.length - 1}" value="${Math.max(0, connectionLevels.indexOf(defaultC))}" step="1" /> <strong id="c-value">${defaultC}</strong>`;
      document.getElementById("rps-at-c").before(slider);

      const cSlider = document.getElementById("c-slider");
      const cValue = document.getElementById("c-value");
      cSlider.addEventListener("input", () => {
        const connections = connectionLevels[Number(cSlider.value)];
        cValue.textContent = String(connections);
        renderAtC(connections);
      });

      renderAtC(defaultC);
    })().catch((err) => {
      document.getElementById("file-hint").hidden = false;
      document.getElementById("file-hint").textContent =
        `加载失败: ${err.message}。请先运行 bun run compare，并确保 results/ 中有 *-plaintext-*-c*.json。`;
    });
  </script>
</body>
</html>
