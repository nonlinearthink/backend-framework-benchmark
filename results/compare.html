<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>Benchmark Compare</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0c0e12;
      --surface: #161a22;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --border: #2a3140;
      --warn-bg: #2a2410;
      --warn-border: #5c4a14;
      --warn-text: #f0d78c;
    }
    body {
      font-family: system-ui, sans-serif;
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: var(--bg);
      color: var(--text);
    }
    h1 { font-weight: 600; letter-spacing: -0.02em; }
    code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1em 0.35em;
      font-size: 0.9em;
    }
    #file-hint {
      padding: 1rem;
      background: var(--warn-bg);
      border: 1px solid var(--warn-border);
      border-radius: 8px;
      color: var(--warn-text);
    }
    canvas { margin-bottom: 2rem; }
  </style>
</head>
<body>
  <h1>Plaintext 30s</h1>
  <p id="file-hint" hidden>
    无法通过 <code>file://</code> 加载 JSON（浏览器 CORS 限制）。请在仓库根目录运行
    <code>bun run compare</code>，然后在打开的 <code>http://127.0.0.1:3456/compare.html</code> 中查看。
  </p>
  <canvas id="rps"></canvas>
  <canvas id="percentiles"></canvas>
  <canvas id="histogram"></canvas>
  <script>
    const FRAMEWORKS = [
      { name: "Elysia (Bun)", file: "elysia-plaintext-30s.json" },
      { name: "Hono (Bun)", file: "hono-plaintext-30s.json" },
      { name: "NestJS (Bun)", file: "nestjs-plaintext-30s.json" },
      { name: "NestJS (Node)", file: "nestjs-node-plaintext-30s.json" },
      { name: "Fiber (Go)", file: "fiber-plaintext-30s.json" },
      { name: "Gin (Go)", file: "gin-plaintext-30s.json" },
    ];

    const COLORS = [
      "rgba(192, 132, 252, 0.85)",
      "rgba(255, 87, 51, 0.85)",
      "rgba(244, 114, 182, 0.85)",
      "rgba(251, 191, 36, 0.85)",
      "rgba(34, 211, 238, 0.85)",
      "rgba(163, 230, 53, 0.85)",
    ];

    const BORDER_COLORS = [
      "rgb(192, 132, 252)",
      "rgb(255, 87, 51)",
      "rgb(244, 114, 182)",
      "rgb(251, 191, 36)",
      "rgb(34, 211, 238)",
      "rgb(163, 230, 53)",
    ];

    const chartText = "#e8eaed";
    const chartMuted = "#9aa0a6";
    const chartGrid = "rgba(255, 255, 255, 0.08)";

    function chartOptions(title, yLabel) {
      const scale = {
        ticks: { color: chartMuted },
        grid: { color: chartGrid },
        border: { color: chartGrid },
      };
      return {
        color: chartText,
        plugins: {
          title: { display: true, text: title, color: chartText },
          legend: { labels: { color: chartText } },
        },
        scales: {
          x: scale,
          y: {
            ...scale,
            title: yLabel
              ? { display: true, text: yLabel, color: chartMuted }
              : undefined,
          },
        },
      };
    }

    async function load(file) {
      const r = await fetch(file);
      return r.json();
    }

    function mergedHistogramLabels(results) {
      const keys = new Set();
      for (const { data } of results) {
        for (const k of Object.keys(data.responseTimeHistogram)) {
          keys.add(k);
        }
      }
      return [...keys].sort((a, b) => Number(a) - Number(b));
    }

    (async () => {
      if (location.protocol === "file:") {
        document.getElementById("file-hint").hidden = false;
        return;
      }

      const results = await Promise.all(
        FRAMEWORKS.map(async (fw) => ({
          ...fw,
          data: await load(fw.file),
        }))
      );

      new Chart(document.getElementById("rps"), {
        type: "bar",
        data: {
          labels: results.map((r) => r.name),
          datasets: [
            {
              label: "Requests/sec",
              data: results.map((r) => r.data.summary.requestsPerSec),
              backgroundColor: COLORS,
            },
          ],
        },
        options: chartOptions("Throughput (RPS)"),
      });

      const keys = ["p50", "p75", "p90", "p95", "p99"];
      new Chart(document.getElementById("percentiles"), {
        type: "bar",
        data: {
          labels: keys,
          datasets: results.map((r, i) => ({
            label: `${r.name} (ms)`,
            data: keys.map((k) => r.data.latencyPercentiles[k] * 1000),
            backgroundColor: COLORS[i],
          })),
        },
        options: chartOptions("Latency percentiles", "ms"),
      });

      const histKeys = mergedHistogramLabels(results);
      const histLabels = histKeys.map((k) => `${(Number(k) * 1000).toFixed(2)} ms`);

      new Chart(document.getElementById("histogram"), {
        type: "line",
        data: {
          labels: histLabels,
          datasets: results.map((r, i) => ({
            label: r.name,
            data: histKeys.map((k) => r.data.responseTimeHistogram[k] ?? 0),
            borderColor: BORDER_COLORS[i],
            backgroundColor: COLORS[i].replace("0.85", "0.25"),
            fill: true,
            tension: 0.2,
          })),
        },
        options: chartOptions("Response time distribution", "requests"),
      });
    })();
  </script>
</body>
</html>
